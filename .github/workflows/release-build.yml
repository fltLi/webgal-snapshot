# This file is partially generated by AI.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Ensure release script executable
        run: chmod +x ./release.sh

      - name: Set VERSION from release tag
        run: echo "${{ github.event.release.tag_name }}" > VERSION

      - name: Run release script
        env:
          PKG_VERSION: github.com/fltLi/webgal-snapshot/pkg/version
        run: |
          set -e
          ./release.sh

      - name: Install zip utility
        run: |
          sudo apt-get update
          sudo apt-get install -y zip

      - name: Package artifacts
        run: |
          set -e
          shopt -s nullglob
          for f in webgal-snapshot-*; do
            base=$(basename "$f")
            zipname="${base}.zip"
            tmpdir=$(mktemp -d)
            cp README.md "$tmpdir/"
            if [[ "$base" == *.exe ]]; then
              cp "$f" "$tmpdir/webgal-snapshot.exe"
            else
              cp "$f" "$tmpdir/webgal-snapshot"
            fi
            (cd "$tmpdir" && zip -r -q "$GITHUB_WORKSPACE/$zipname" .)
            echo "Created $zipname"
          done

      - name: Install GitHub CLI
        run: |
          sudo apt-get update && sudo apt-get install -y curl gnupg
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install -y gh

      - name: Upload assets to Release using gh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          set -e
          gh release upload "$TAG" webgal-snapshot-*.zip --repo "${{ github.repository }}" --clobber
